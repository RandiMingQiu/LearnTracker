<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>LearnTracker</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #409eff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #66b1ff;
        }

        .token {
            word-break: break-all;
            color: green;
        }

        .resource-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>📚 LearnTracker</h1>

    <div class="card">
        <h2>👤 用户模块</h2>

        <h3>注册</h3>
        <input id="reg_username" placeholder="用户名">
        <input id="reg_password" placeholder="密码">
        <input id="reg_email" placeholder="邮箱">
        <button onclick="register()">注册</button>

        <h3>登录</h3>
        <input id="login_username" placeholder="用户名">
        <input id="login_password" placeholder="密码">
        <button onclick="login()">登录</button>

        <p class="token">Token：<span id="token"></span></p>
    </div>

    <div class="card">
        <h2>📦 资源管理</h2>

        <h3>新增资源</h3>
        <input id="title" placeholder="标题">
        <input id="type" placeholder="类型（ARTICLE等）">
        <input id="url" placeholder="链接">
        <input id="status" placeholder="状态（TODO等）">
        <button onclick="addResource()">新增</button>

        <h3>资源列表</h3>
        <button onclick="listResource()">刷新列表</button>

        <div id="list"></div>
    </div>

</div>

<script>

    let token = "";

    // 注册
    function register() {
        fetch("http://localhost:8080/user/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: reg_username.value,
                password: reg_password.value,
                email: reg_email.value
            })
        }).then(res => res.json()).then(data => {
            alert("注册成功");
        });
    }

    // 登录
    function login() {
        fetch("http://localhost:8080/user/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: login_username.value,
                password: login_password.value
            })
        }).then(res => res.json()).then(data => {

            console.log("返回数据：", data); // 👈 关键

            if (data.code !== 200) {
                alert("登录失败：" + data.message);
                return;
            }

            token = data.data.token;
            document.getElementById("token").innerText = token;

            alert("登录成功");
        });
    }

    // 新增资源
    function addResource() {
        fetch("http://localhost:8080/resource", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            },
            body: JSON.stringify({
                title: title.value,
                type: type.value,
                url: url.value,
                status: status.value
            })
        }).then(res => res.json()).then(data => {
            alert("添加成功");
            listResource();
        });
    }

    // 查询资源
    function listResource() {
        fetch("http://localhost:8080/resource/page?page=0&size=10", {
            method: "GET",
            headers: {
                "Authorization": token
            }
        }).then(res => res.json()).then(data => {
            let list = document.getElementById("list");
            list.innerHTML = "";

            data.data.content.forEach(item => {
                let div = document.createElement("div");
                div.className = "resource-item";
                div.innerHTML = `
                <b>${item.title}</b><br>
                类型：${item.type} ｜ 状态：${item.status}
            `;
                list.appendChild(div);
            });
        });
    }

</script>

</body>
</html>
