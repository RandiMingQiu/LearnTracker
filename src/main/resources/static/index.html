    <title>登录</title>

<body>

<h2>登录</h2>

<input id="loginUsername" placeholder="用户名"><br>
<input id="loginPassword" type="password" placeholder="密码"><br>

<input id="regEmail" placeholder="邮箱"><br>

<button onclick="register()">注册</button>

</body>
</html>
