<div class="card">

    <h3>标签</h3>
    <input id="tagName" placeholder="标签">
    <button onclick="addTag()">添加</button>
    <ul id="tagList" class="list"></ul>

    <h3>资源</h3>
    <input id="title" placeholder="标题">
    <input id="url" placeholder="链接">
    <input id="type" placeholder="类型">
    <input id="status" placeholder="状态">

    <select id="tagSelect" multiple></select>

    <button onclick="addResource()">添加资源</button>
    <ul id="resourceList" class="list"></ul>

    <h3>笔记</h3>
    <input id="noteContent" placeholder="笔记">
    <button onclick="addNote()">添加笔记</button>
    <ul id="noteList"></ul>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
